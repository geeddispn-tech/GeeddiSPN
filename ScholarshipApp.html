function getAnswer(input){
  const q=input.toLowerCase();
  for(const item of FAQ){ if(item.q.some(kw=>q.includes(kw))) return item.a; }
  const match=SCHOLARSHIPS.find(s=>s.id===q||s.name.toLowerCase().split(' ').some(w=>w.length>4&&q.includes(w)));
  if(match) return `${match.flag} ${match.name}\n\n📅 Deadline: ${match.deadline}\n💰 Funding: ${match.funding}\n🌍 Eligible: ${match.eligibleCountries.slice(0,5).join(', ')}\n\nTop requirements:\n${match.requirements.slice(0,3).map((r,i)=>`${i+1}. ${r}`).join('\n')}\n\n🔗 ${match.website}`;
  return "I'm not sure about that. Try asking about:\n• A specific scholarship: 'DAAD', 'Chevening', 'Rhodes Kenya'\n• 'Scholarships for Kenya' or 'Somalia'\n• 'Documents needed'\n• 'Motivation letter tips'\n• 'Thesis writing'\n• 'Deadlines 2026'\n\nOr browse scholarships in the Scholarships tab!";
}

  const imrad={en:[{part:'Abstract',desc:'Summary (150–250 words) — purpose, method, findings, conclusion.'},{part:'Introduction',desc:'Background, research gap, aim, research questions.'},{part:'Method',desc:'How you conducted the research — detailed enough to replicate.'},{part:'Results',desc:'Objective findings using tables and figures.'},{part:'Discussion',desc:'Interpret results, compare with existing research, acknowledge limitations.'},{part:'Conclusion',desc:'Key findings and future research directions.'},{part:'References',desc:'All cited sources in APA 7 or required style.'}],

    so:[{part:'Abstract (Kooban)',desc:'Soo koobid (150–250 erayo) — ujeedada, habka, natiijooyinka, gabagabada.'},{part:'Hordhac',desc:'Asalka, farqiga cilmi-baarista, ujeedada, su\'aalaha.'},{part:'Hab',desc:'Sida aad u sameysay cilmi-baaristaada.'},{part:'Natiijooyin',desc:'Soo gudbi natiijooyinka si dabiici ah.'},{part:'Doodda',desc:'Sharax natiijooyinka, kula bar cilmi-baarista hore.'},{part:'Gabagabo',desc:'Natiijooyinka ugu muhiimsan iyo cilmi-baaris mustaqbalka.'},{part:'Liiska Tixraacyada',desc:'Dhammaan ilaha la soo xigay APA 7.'}],
    sw:[{part:'Muhtasari',desc:'Muhtasari (maneno 150–250) — madhumuni, mbinu, matokeo, hitimisho.'},{part:'Utangulizi',desc:'Msingi, pengo la utafiti, lengo, maswali.'},{part:'Mbinu',desc:'Jinsi ulivyofanya utafiti — kwa undani wa kutosha.'},{part:'Matokeo',desc:'Matokeo ya lengo ukitumia jedwali na takwimu.'},{part:'Majadiliano',desc:'Tafsiri matokeo, linganisha na utafiti wa awali.'},{part:'Hitimisho',desc:'Matokeo muhimu na mapendekezo.'},{part:'Marejeo',desc:'Vyanzo vyote vilivyonukuliwa kwa APA 7.'}]};
  const resources=[{name:'Skrivguiden.se',url:'https://skrivguiden.se'},{name:'Stockholm University Writing Centre',url:'https://www.su.se/utbildning/studera-vid-universitetet/studie--och-sprakverkstaden'},{name:'Linnaeus University – Skriva akademiskt',url:'https://lnu.se/ub/sjalvstudieguider/Skriva-akademiskt'},{name:'Purdue OWL – Academic Writing',url:'https://owl.purdue.edu'},{name:'Zotero – Free Reference Manager',url:'https://www.zotero.org'}];
  const secLabels={en:['IMRAD','Language','Citations','Tips','Resources'],sv:['IMRAD','Språk','Källor','Tips','Resurser'],so:['IMRAD','Luqad','Tixraac','Talooyin','Kheyraad'],sw:['IMRAD','Lugha','Marejeo','Vidokezo','Rasilimali']};
  const sl=secLabels[lang]||secLabels.en;
  const secs=[{k:'imrad',icon:'📐',l:sl[0]},{k:'language',icon:'✍️',l:sl[1]},{k:'citations',icon:'📚',l:sl[2]},{k:'tips',icon:'💡',l:sl[3]},{k:'resources',icon:'🔗',l:sl[4]}];
  const heading={en:'Academic Writing',sv:'Akademiskt skrivande',so:'Qorista Akadeemiga',sw:'Uandishi wa Kitaaluma'};
  const langTips={en:["Use formal, impersonal language — 'This study indicates…' not 'I think…'","Be precise and concise.","Define technical terms when first used.","Use hedging: 'may', 'suggests', 'indicates'.","Avoid contractions (don't → do not)."],sv:["Använd formellt, opersonligt språk — 'Studien indikerar…' inte 'Jag tror…'",'Var precis och koncis.','Definiera termer när de förekommer för första gången.',"Använd hedgingspråk: 'kan', 'tyder på'.",'Undvik talspråk.'],so:["Isticmaal luqad rasmi ah — 'Cilmi-baaristu waxay muujinaysaa…'",'Ahaow saxan oo kooban.','Qeex ereyada farsamada marka ugu horeysa.',"Isticmaal: 'waxa suurtogalka ah', 'waxay tilmaamaysaa'.",'Ka fogow luqadda carrabka.'],sw:["Tumia lugha rasmi — 'Utafiti huu unaonyesha…' si 'Nadhani…'","Kuwa sahihi na mfupi.","Fafanua istilahi za kiufundi zinapotokea kwanza.","Tumia tahadhari: 'inaweza', 'inapendekeza'.","Epuka mikataba (don't → do not)."]};
  const citeTips={en:["Cite all sources — uncited ideas = plagiarism.","APA 7: (Author, Year) in-text.","Direct quote: add page — (Smith, 2023, p. 45).","Reference list: alphabetical, end of document.","Use Zotero (free) or Mendeley."],sv:["Citera alltid — ocitaterade idéer = plagiat.","APA 7: (Författare, År).",'Direkt citat: lägg till sidnummer — (Smith, 2023, s. 45).','Referenslista: alfabetisk ordning.','Använd Zotero (gratis) eller Mendeley.'],so:["Had iyo jeer tixraac — xad-gudub.",'APA 7: (Qore, Sanad).','Xigasho toos ah: ku dar bogga — (Smith, 2023, bog. 45).','Liiska tixraacyada: alifbato.','Isticmaal Zotero (bilaash) ama Mendeley.'],sw:["Nukuu vyanzo daima — bila nukuu = wizi wa kifikira.","APA 7: (Mwandishi, Mwaka).","Nukuu ya moja kwa moja: ukurasa — (Smith, 2023, uk. 45).","Orodha ya marejeo: alfabeti, mwisho.","Tumia Zotero (bure) au Mendeley."]};
  const writeTips={en:['Read published articles in your field before starting.','Write the abstract last.','Draft a core sentence (10–14 words) summarising your finding.','Use JSTOR, Google Scholar, SCOPUS, SwePub.','Ask your supervisor for early feedback.','Use the university writing centre for language help.','Check for plagiarism with Urkund/Ouriginal.'],sv:['Läs publicerade artiklar i ditt ämne.','Skriv abstractet sist.','Formulera en kärnmening (10–14 ord).','Använd JSTOR, Google Scholar, SCOPUS, SwePub.','Be handledaren om tidig feedback.','Utnyttja skrivverkstaden.','Kontrollera plagiat med Urkund/Ouriginal.'],so:['Akhri maqaallo la daabacay ee xagga adiga.','Qor abstractka ugu dambays.','Qor jumle asaasiya (10–14 erayo).','Isticmaal JSTOR, Google Scholar, SCOPUS, SwePub.','Weydii kordhisaha ra\'yi hore.','Isticmaal xarunta qorista.','Hubi xad-gudubka adoo isticmaalaya Urkund/Ouriginal.'],sw:['Soma makala zilizochapishwa katika uwanja wako.','Andika muhtasari mwishowe.','Tunga sentensi kuu (maneno 10–14).','Tumia JSTOR, Google Scholar, SCOPUS, SwePub.','Omba maoni ya msimamizi mapema.','Tumia kituo cha uandishi.','Kagua uigaji kwa Urkund/Ouriginal.']};
  const il=imrad[lang]||imrad.en;
  const ll=langTips[lang]||langTips.en;
  const ctl=citeTips[lang]||citeTips.en;
  const wtl=writeTips[lang]||writeTips.en;
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <SectionHeader color={G} title={heading[lang]||heading.en} sub='IMRAD · APA 7 · Skrivguiden · Academic Style'/>
      <div style={{flex:1,overflowY:'auto'}}>
        <div style={{display:'flex',gap:6,overflowX:'auto',padding:'10px 14px 6px'}}>
          {secs.map(s=>(
            <button key={s.k} onClick={()=>setSec(s.k)}
              style={{flexShrink:0,display:'flex',alignItems:'center',gap:4,padding:'6px 12px',borderRadius:20,border:`1.5px solid ${sec===s.k?G:'#C5D8C5'}`,background:sec===s.k?G:'#fff',color:sec===s.k?'#fff':'#555',fontSize:12,fontWeight:sec===s.k?700:500,cursor:'pointer'}}>
              {s.icon} {s.l}
            </button>
          ))}
        </div>
        <div style={{padding:'6px 14px 32px'}}>
          {sec==='imrad'&&<Card>
            {il.map((item,i)=>(
              <div key={i} style={{display:'flex',gap:12,paddingBottom:10,borderBottom:i<il.length-1?'1px solid #F0F4FA':'none',marginBottom:i<il.length-1?10:0}}>
                <div style={{width:24,height:24,borderRadius:12,background:G,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{color:'#fff',fontWeight:700,fontSize:11}}>{i+1}</span>
                </div>
                <div><div style={{fontSize:13,fontWeight:700,color:G,marginBottom:2}}>{item.part}</div><div style={{fontSize:12,color:'#555',lineHeight:'18px'}}>{item.desc}</div></div>
              </div>
            ))}
          </Card>}
          {sec==='language'&&<Card>{ll.map((t,i)=><div key={i} style={{display:'flex',gap:8,marginBottom:i<ll.length-1?10:0}}><span style={{color:G}}>•</span><span style={{fontSize:13,color:'#444',lineHeight:'19px',flex:1}}>{t}</span></div>)}</Card>}
          {sec==='citations'&&<Card>
            {ctl.map((t,i)=><div key={i} style={{display:'flex',gap:8,marginBottom:i<ctl.length-1?10:0}}><span>📎</span><span style={{fontSize:13,color:'#444',lineHeight:'19px',flex:1}}>{t}</span></div>)}
            <div style={{background:'#F5FAF5',borderRadius:8,padding:12,marginTop:12}}>
              <div style={{fontSize:13,fontWeight:700,color:G,marginBottom:8}}>APA 7 Quick Guide</div>
              {[['Book:','Author, A. A. (Year). Title. Publisher.'],['Article:','Author, A. A. (Year). Title. Journal, Vol(Issue), pages.'],['Website:','Author. (Year, Month Day). Title. URL']].map(([l,v],i)=><div key={i} style={{fontSize:12,color:'#444',marginBottom:4}}><b>{l}</b> {v}</div>)}
            </div>
          </Card>}
          {sec==='tips'&&<Card>{wtl.map((t,i)=><div key={i} style={{display:'flex',gap:10,marginBottom:i<wtl.length-1?10:0}}><div style={{width:22,height:22,borderRadius:11,background:G,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><span style={{color:'#fff',fontWeight:700,fontSize:11}}>{i+1}</span></div><span style={{fontSize:13,color:'#444',lineHeight:'19px',flex:1}}>{t}</span></div>)}</Card>}
          {sec==='resources'&&<Card>{resources.map((r,i)=><a key={i} href={r.url} target="_blank" rel="noopener noreferrer" style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:i<resources.length-1?'1px solid #F0F4FA':'none',textDecoration:'none'}}><span>🔗</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:G}}>{r.name}</div><div style={{fontSize:11,color:'#999'}}>{r.url.replace('https://','')}</div></div><span style={{color:G,fontSize:16}}>›</span></a>)}</Card>}
        </div>
      </div>
    </div>
  );
}

// CHAT
// ══════════════════════════════════════════════════════════════════
function ChatScreen(){
  const {lang}=useLang();
  const greeting=lang==='sw'?'Habari! 👋 Mimi ni Msaidizi wa Geeddispn.\n\nNinaweza kukusaidia na:\n🎓 Ufadhili (Kenya 🇰🇪, Somalia 🇸🇴, Afrika Mashariki 🌍)\n📝 Uandishi wa tasnifu (Bachelor\'s / Master\'s / PhD)\n✍️ Uandishi wa kitaaluma\n📋 Vidokezo vya maombi\n\nNiulize chochote!':
    lang==='so'?'Salaan! 👋 Waxaan ahay Kalkaaliyaha Geeddispn.\n\nWaxaan kaa caawin karaa:\n🎓 Deeqaha (Kenya 🇰🇪, Soomaaliya 🇸🇴, Bariga Afrika 🌍)\n📝 Qorista buuggaaga (Bachelor\'s / Master\'s / PhD)\n✍️ Qorista akadeemiga\n📋 Talooyin codsiga\n\nWax kasta i weydii!':
    lang==='sv'?'Hej! 👋 Jag är Geeddispn-assistenten.\n\nJag kan hjälpa dig med:\n🎓 Stipendier (Kenya 🇰🇪, Somalia 🇸🇴, Östafrika 🌍)\n📝 Uppsatsskrivning (Kandidat / Master / PhD)\n✍️ Akademiskt skrivande\n📋 Ansökningstips\n\nFråga mig vad som helst!':
    'Hello! 👋 I\'m the Geeddispn Assistant.\n\nI can help you with:\n🎓 Scholarships (Kenya 🇰🇪, Somalia 🇸🇴, East Africa 🌍)\n📝 Thesis writing (Bachelor\'s / Master\'s / PhD)\n✍️ Academic writing & IMRAD\n📋 Application tips & deadlines\n\nAsk me anything!';
  const [messages,setMessages]=useState([{from:'bot',text:greeting}]);
  const [input,setInput]=useState('');
  const [thinking,setThinking]=useState(false);
  const bottomRef=useRef(null);
  const chips=['Kenya scholarships','DAAD Germany','Rhodes Oxford','Chevening','Thesis types','PhD tips','Motivation letter','SISGP deadline'];
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[messages]);
  const send=(text)=>{
    const msg=text||input.trim();
    if(!msg) return;
    setInput('');
    setMessages(prev=>[...prev,{from:'user',text:msg}]);
    setThinking(true);
    setTimeout(()=>{setMessages(prev=>[...prev,{from:'bot',text:getAnswer(msg)}]);setThinking(false);},700);
  };
  const heading={en:'AI Assistant',sv:'AI-assistent',so:'Kalkaaliyaha AI',sw:'Msaidizi wa AI'};
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <SectionHeader color='#4A1A8A' title={`🤖 ${heading[lang]||heading.en}`} sub='Powered by Geeddispn · Scholarships · Thesis · Writing'/>
      <div style={{display:'flex',gap:6,overflowX:'auto',padding:'8px 12px 4px',background:'#FAF5FF',flexShrink:0}}>
        {chips.map((s,i)=><button key={i} onClick={()=>send(s)} style={{flexShrink:0,padding:'5px 11px',borderRadius:20,border:'1.5px solid #C4B5FD',background:'#fff',color:'#6D28D9',fontSize:11,fontWeight:500,cursor:'pointer',whiteSpace:'nowrap'}}>{s}</button>)}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:10}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.from==='user'?'flex-end':'flex-start'}}>
            {m.from==='bot'&&<div style={{width:28,height:28,borderRadius:14,background:'#4A1A8A',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginRight:8,marginTop:2,fontSize:13}}>🤖</div>}
            <div style={{maxWidth:'80%',background:m.from==='user'?'#6D28D9':'#fff',color:m.from==='user'?'#fff':'#333',borderRadius:m.from==='user'?'16px 16px 4px 16px':'4px 16px 16px 16px',padding:'10px 13px',fontSize:13,lineHeight:'20px',boxShadow:'0 1px 4px rgba(0,0,0,0.08)',whiteSpace:'pre-line'}}>{m.text}</div>
          </div>
        ))}
        {thinking&&<div style={{display:'flex',gap:8}}><div style={{width:28,height:28,borderRadius:14,background:'#4A1A8A',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>🤖</div><div style={{background:'#fff',borderRadius:'4px 16px 16px 16px',padding:'10px 14px',boxShadow:'0 1px 4px rgba(0,0,0,0.08)',display:'flex',gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:'50%',background:'#C4B5FD',animation:`bounce 1s ${i*0.2}s infinite`}}/>)}</div></div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:'10px 12px 14px',background:'#fff',borderTop:'1px solid #EDE9FE',flexShrink:0,display:'flex',gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
          placeholder={lang==='sw'?'Uliza swali…':lang==='so'?"Su'aal weydii…":lang==='sv'?'Ställ en fråga…':'Ask a question…'}
          style={{flex:1,border:'1.5px solid #C4B5FD',borderRadius:24,padding:'10px 16px',fontSize:13,outline:'none',color:'#333'}}/>
        <button onClick={()=>send()} style={{background:'#6D28D9',border:'none',borderRadius:24,padding:'10px 18px',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>
          {lang==='sw'?'Tuma':lang==='so'?'Dir':lang==='sv'?'Skicka':'Send'}
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// ROOT
// ══════════════════════════════════════════════════════════════════
const TABS=['home','scholarships','guide','thesis','writing','chat'];
const ICONS={home:'🏠',scholarships:'🎓',guide:'📋',thesis:'📝',writing:'✏️',chat:'🤖'};
const TAB_LABEL={en:{home:'Home',scholarships:'Scholarships',guide:'Apply',thesis:'Thesis',writing:'Writing',chat:'AI'},sv:{home:'Hem',scholarships:'Stipendier',guide:'Ansök',thesis:'Uppsats',writing:'Skriv',chat:'AI'},so:{home:'Guriga',scholarships:'Deeqaha',guide:'Codsiga',thesis:'Buugga',writing:'Qorista',chat:'AI'},sw:{home:'Nyumbani',scholarships:'Ufadhili',guide:'Omba',thesis:'Tasnifu',writing:'Andika',chat:'AI'}};

function App(){
  const [lang,setLang]=useState('en');
  const [tab,setTab]=useState('home');
  const t={}; // placeholder for context
  return(
    <LangCtx.Provider value={{lang,setLang,t}}>
      <style>{`@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}`}</style>
      <div style={{display:'flex',flexDirection:'column',height:'100%',minHeight:'100vh'}}>
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',paddingBottom:58}}>
          {tab==='home'         &&<HomeScreen setTab={setTab}/>}
          {tab==='scholarships' &&<ScholarshipsScreen/>}
          {tab==='guide'        &&<GuideScreen/>}
          {tab==='thesis'       &&<ThesisScreen/>}
          {tab==='writing'      &&<WritingScreen/>}
          {tab==='chat'         &&<ChatScreen/>}
        </div>
        <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:'#fff',borderTop:'1px solid #E8E0FF',display:'flex',height:58,zIndex:100}}>
          {TABS.map(t2=>{
            const lbl=(TAB_LABEL[lang]||TAB_LABEL.en)[t2];
            return(
              <button key={t2} onClick={()=>setTab(t2)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',border:'none',background:tab===t2?'#F5F0FF':'transparent',cursor:'pointer',gap:1,padding:'6px 0'}}>
                <span style={{fontSize:tab===t2?19:16}}>{ICONS[t2]}</span>
                <span style={{fontSize:8,color:tab===t2?'#6D28D9':'#999',fontWeight:tab===t2?700:400}}>{lbl}</span>
              </button>
            );
          })}
        </div>
      </div>
    </LangCtx.Provider>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
